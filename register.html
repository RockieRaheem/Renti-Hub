<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | RentiHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0037b0 0%, #1d4ed8 100%);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-2xl">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-3 bg-white px-6 py-3 rounded-2xl shadow-lg">
        <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-blue-800 rounded-xl flex items-center justify-center">
          <span class="material-symbols-outlined text-white">corporate_fare</span>
        </div>
        <span class="text-2xl font-extrabold text-gray-900">RentiHub</span>
      </div>
    </div>

    <!-- Register Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Create Account</h1>
      <p class="text-gray-600 mb-8">Sign up for RentiHub</p>

      <form id="registerForm" class="space-y-6">
        <div class="grid md:grid-cols-2 gap-6">
          <!-- Full Name -->
          <div>
            <label for="fullName" class="block text-sm font-semibold text-gray-700 mb-2">
              Full Name *
            </label>
            <input
              type="text"
              id="fullName"
              required
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              placeholder="John Doe"
            >
          </div>

          <!-- Phone -->
          <div>
            <label for="phone" class="block text-sm font-semibold text-gray-700 mb-2">
              Phone Number *
            </label>
            <input
              type="tel"
              id="phone"
              required
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              placeholder="+256700000000"
            >
          </div>
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">
            Email Address *
          </label>
          <input
            type="email"
            id="email"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            placeholder="you@example.com"
          >
        </div>

        <div class="grid md:grid-cols-2 gap-6">
          <!-- Password -->
          <div>
            <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
              Password *
            </label>
            <input
              type="password"
              id="password"
              required
              minlength="6"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              placeholder="••••••••"
            >
          </div>

          <!-- Confirm Password -->
          <div>
            <label for="confirmPassword" class="block text-sm font-semibold text-gray-700 mb-2">
              Confirm Password *
            </label>
            <input
              type="password"
              id="confirmPassword"
              required
              minlength="6"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              placeholder="••••••••"
            >
          </div>
        </div>

        <!-- Role (hidden for tenant registration, admin creates other roles) -->
        <input type="hidden" id="role" value="tenant">

        <!-- Terms & Conditions -->
        <label class="flex items-start">
          <input type="checkbox" id="terms" required class="w-4 h-4 mt-1 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
          <span class="ml-2 text-sm text-gray-600">
            I agree to the <a href="#" class="text-blue-600 hover:text-blue-700">Terms & Conditions</a> and <a href="#" class="text-blue-600 hover:text-blue-700">Privacy Policy</a>
          </span>
        </label>

        <!-- Error Message -->
        <div id="errorMessage" class="hidden bg-red-50 text-red-600 px-4 py-3 rounded-lg text-sm"></div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white font-semibold py-3 rounded-lg hover:from-blue-700 hover:to-blue-800 transition transform active:scale-95 flex items-center justify-center gap-2"
        >
          <span>Create Account</span>
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
      </form>

      <!-- Login Link -->
      <p class="mt-6 text-center text-gray-600">
        Already have an account?
        <a href="login.html" class="font-semibold text-blue-600 hover:text-blue-700">
          Sign in
        </a>
      </p>
    </div>

    <!-- Footer -->
    <p class="mt-8 text-center text-white text-sm">
      &copy; 2026 RentiHub. All rights reserved.
    </p>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <!-- App Scripts -->
  <script src="config/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/database.js"></script>
  <script src="js/auth.js"></script>

  <script>
    // Initialize Firebase
    initializeFirebase();
    dbService.init();

    // Handle registration form submission
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const fullName = document.getElementById('fullName').value;
      const phone = document.getElementById('phone').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const role = document.getElementById('role').value;
      const terms = document.getElementById('terms').checked;
      const errorMessage = document.getElementById('errorMessage');
      const submitButton = e.target.querySelector('button[type="submit"]');
      
      // Hide previous errors
      errorMessage.classList.add('hidden');
      
      // Validate passwords match
      if (password !== confirmPassword) {
        errorMessage.textContent = 'Passwords do not match';
        errorMessage.classList.remove('hidden');
        return;
      }
      
      // Validate phone number
      if (!validatePhone(phone)) {
        errorMessage.textContent = 'Invalid phone number. Use format: +256700000000 or 0700000000';
        errorMessage.classList.remove('hidden');
        return;
      }
      
      // Validate terms
      if (!terms) {
        errorMessage.textContent = 'Please accept the terms and conditions';
        errorMessage.classList.remove('hidden');
        return;
      }
      
      // Disable submit button
      submitButton.disabled = true;
      submitButton.innerHTML = '<span>Creating account...</span>';
      
      try {
        const result = await authService.register(email, password, {
          fullName,
          phone: formatPhone(phone),
          role
        });
        
        if (result.success) {
          showToast('Account created successfully!', 'success');
          // Redirect will be handled by authService
        } else {
          errorMessage.textContent = result.error || 'Registration failed. Please try again.';
          errorMessage.classList.remove('hidden');
        }
      } catch (error) {
        errorMessage.textContent = 'An error occurred. Please try again.';
        errorMessage.classList.remove('hidden');
      } finally {
        submitButton.disabled = false;
        submitButton.innerHTML = '<span>Create Account</span><span class="material-symbols-outlined">arrow_forward</span>';
      }
    });
  </script>
</body>
</html>
